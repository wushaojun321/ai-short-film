services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
    restart: unless-stopped

  v2ray:
    image: v2fly/v2fly-core:latest
    volumes:
      - ./v2ray/config.json:/etc/v2ray/config.json:ro
    command: run -c /etc/v2ray/config.json
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
      HTTP_PROXY: http://v2ray:10801
      HTTPS_PROXY: http://v2ray:10801
    depends_on:
      - v2ray
      - mongodb
      - redis
    restart: unless-stopped

  worker-llm:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q llm -c 2 --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
      HTTP_PROXY: http://v2ray:10801
      HTTPS_PROXY: http://v2ray:10801
    depends_on:
      - v2ray
      - mongodb
      - redis
    restart: unless-stopped

  worker-image:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q image -c 4 --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
      # 火山引擎是国内服务，不走代理
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  worker-video:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q video -c 2 --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
      # 火山引擎是国内服务，不走代理
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  worker-merge:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q merge -c 1 --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
