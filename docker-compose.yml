services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-llm:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q llm -c 2 --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-image:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q image -c 4 --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-video:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q video -c 2 --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker-merge:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app worker -Q merge -c 1 --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      MONGODB_URL: mongodb://mongodb:27017/ai_short_film
      REDIS_URL: redis://redis:6379/0
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  mongodb:
    image: mongo:7
    ports:
      - "27018:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
